name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ["1.25"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      # golangci-lint deferred — at the Go 1.25 release window (early 2026),
      # the action's bundled binary is still built with Go 1.24 and refuses
      # to lint code targeting 1.25.0. Re-enable once a 1.25-compatible
      # golangci-lint ships. Go vet + the depguard_test.go architecture
      # check cover the load-bearing quality gates for v1.0.
      - name: Vet
        run: CGO_ENABLED=0 go vet ./...

      - name: Test
        run: CGO_ENABLED=0 go test -race ./...

      - name: Build (static)
        run: CGO_ENABLED=0 go build -o cloudcmder_ci ./cmd/cloudcmder

  release-check:
    name: GoReleaser Snapshot
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: GoReleaser snapshot
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --snapshot --clean
